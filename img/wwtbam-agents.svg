<svg width="1600" height="900" viewBox="0 0 1600 900"
     xmlns="http://www.w3.org/2000/svg">

<!-- ================= BACKGROUND ================= -->
<rect width="1600" height="900" fill="#0b1022"/>

<!-- Stage floor -->
<ellipse cx="800" cy="780" rx="720" ry="140"
         fill="#101a3a" stroke="#4f8cff" stroke-width="2"/>

<!-- Arena rings -->
<g transform="translate(800,260)" stroke="#4f8cff" fill="none">
  <circle r="240" stroke-width="3"/>
  <circle r="180" stroke-width="2" opacity="0.6"/>
  <circle r="120" stroke-width="1.5" opacity="0.4"/>
</g>

<!-- ================= HEADLINES ================= -->
<text x="300" y="90"
      fill="#93c5fd"
      font-size="42"
      font-family="Arial"
      font-weight="bold">
  LLM
</text>

<text x="930" y="90"
      fill="#93c5fd"
      font-size="42"
      font-family="Arial"
      font-weight="bold">
  Agentic Loop Control
</text>

<!-- ================= LEFT SYMBOL: SPARKLE ================= -->
<g transform="translate(600,420)" stroke="#ffffff" stroke-width="3" fill="none">
  <polygon points="0,-90 20,-20 90,0 20,20 0,90 -20,20 -90,0 -20,-20"
           fill="#1e40af"/>
  <circle r="35" fill="#0b1229" stroke="#93c5fd"/>
</g>

<!-- ================= RIGHT SYMBOL: GEAR ================= -->
<g transform="translate(1000,420)" stroke="#ffffff" stroke-width="3" fill="#1e40af">

  <!-- gear teeth -->
  <g>
    <rect x="-20" y="-120" width="40" height="40"/>
    <rect x="-20" y="80" width="40" height="40"/>
    <rect x="-120" y="-20" width="40" height="40"/>
    <rect x="80" y="-20" width="40" height="40"/>

    <rect x="60" y="-100" width="40" height="40" transform="rotate(45)"/>
    <rect x="-100" y="-100" width="40" height="40" transform="rotate(45)"/>
    <rect x="-100" y="60" width="40" height="40" transform="rotate(45)"/>
    <rect x="60" y="60" width="40" height="40" transform="rotate(45)"/>
  </g>

  <!-- gear core -->
  <circle r="90"/>
  <circle r="35" fill="#0b1022"/>
</g>

<!-- ================= DESKS (API INTERFACE) ================= -->

<!-- Left desk -->
<polygon points="350,540 750,540 710,640 310,640"
         fill="#0b1229"
         stroke="#4f8cff"
         stroke-width="2"/>

<polygon points="380,565 720,565 690,620 350,620"
         fill="#1e40af"
         opacity="0.9"/>

<!-- Right desk -->
<polygon points="850,540 1250,540 1290,640 890,640"
         fill="#0b1229"
         stroke="#4f8cff"
         stroke-width="2"/>

<polygon points="880,565 1220,565 1250,620 910,620"
         fill="#1e40af"
         opacity="0.9"/>

<!-- Central console (channel between both) -->
<polygon points="740,640 860,640 900,720 700,720"
         fill="#0c1229"
         stroke="#4f8cff"
         stroke-width="2"/>

<!-- ================= TOOL PANEL ================= -->
<g transform="translate(1050,140)">

  <rect width="460" height="280"
        rx="20"
        fill="#0c1229"
        stroke="#4f8cff"
        stroke-width="2"/>

  <!-- bash -->
  <rect x="40" y="30" width="380" height="50"
        rx="12"
        fill="#111827"
        stroke="#4f8cff"
        stroke-width="1.5"/>
  <text x="230" y="63"
        font-size="22"
        text-anchor="middle"
        fill="#93c5fd"
        font-family="Arial">
    bash
  </text>

  <!-- grep -->
  <rect x="40" y="95" width="380" height="50"
        rx="12"
        fill="#111827"
        stroke="#4f8cff"
        stroke-width="1.5"/>
  <text x="230" y="128"
        font-size="22"
        text-anchor="middle"
        fill="#93c5fd"
        font-family="Arial">
    grep
  </text>

  <!-- diff -->
  <rect x="40" y="160" width="380" height="50"
        rx="12"
        fill="#111827"
        stroke="#4f8cff"
        stroke-width="1.5"/>
  <text x="230" y="193"
        font-size="22"
        text-anchor="middle"
        fill="#93c5fd"
        font-family="Arial">
    diff
  </text>

  <!-- Empty dotted -->
  <rect x="40" y="225" width="380" height="50"
        rx="12"
        fill="#111827"
        stroke="#93c5fd"
        stroke-width="1.5"
        stroke-dasharray="6 6"/>

</g>

</svg>
